<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  /* dark (default) */
  --bg:#0A0E17;--s1:#111827;--s2:#1A2332;
  --txt:#FFFFFF;--txt2:rgba(255,255,255,.5);--txt3:rgba(255,255,255,.32);--txt4:rgba(255,255,255,.14);
  --brd:rgba(255,255,255,.06);--brd2:rgba(255,255,255,.1);
  --chip:rgba(255,255,255,.04);--over:rgba(0,0,0,.2);
  --ph-shadow:0 24px 80px rgba(0,0,0,.75),0 0 0 3px rgba(255,255,255,.08);
  --green:#00D65B;--green2:#00B14F;
  --purple:#A855F7;--amber:#F59E0B;--blue:#60A5FA;--red:#EF4444;
  --cu:#C8773A;--cu2:#E89B5A;
  --font:'Plus Jakarta Sans',-apple-system,sans-serif;
  --mono:'Space Mono',monospace;
}
.lm{
  --bg:#F0F5FB;--s1:#FFFFFF;--s2:#E8EFF8;
  --txt:#0C1220;--txt2:rgba(12,18,32,.55);--txt3:rgba(12,18,32,.38);--txt4:rgba(12,18,32,.12);
  --brd:rgba(12,18,32,.07);--brd2:rgba(12,18,32,.13);
  --chip:rgba(12,18,32,.04);--over:rgba(12,18,32,.04);
  --ph-shadow:0 24px 80px rgba(0,0,0,.18),0 0 0 3px rgba(12,18,32,.1);
}
body{font-family:var(--font);background:#050A12;color:var(--txt);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;transition:background .3s}
.phone{width:390px;max-height:100vh;height:844px;background:var(--bg);overflow:hidden;display:flex;flex-direction:column;position:relative}
@media(min-width:481px){.phone{border-radius:40px;box-shadow:var(--ph-shadow)}.phone::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#000;border-radius:0 0 16px 16px;z-index:100}}
@media(max-width:480px){.phone{width:100%;height:100%;max-height:100vh;border-radius:0}}
.sbar{padding:10px 20px 4px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--txt3);flex-shrink:0}
.scr{flex:1;overflow-y:auto;padding:0 20px 16px;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}
.hd{display:none!important}
.bnav{display:flex;justify-content:space-around;padding:8px 0 20px;border-top:1px solid var(--brd);flex-shrink:0;background:var(--bg);transition:background .3s,border-color .3s}
.ni{text-align:center;cursor:pointer;padding:4px 10px;border-radius:8px;border:none;background:none;color:var(--txt3);font-family:var(--font);transition:.2s}
.ni.on{color:var(--green)}
.ni .ic{font-size:20px;line-height:1.2}
.ni .lb{font-size:9px;margin-top:1px;font-weight:600}
.cd{background:linear-gradient(145deg,var(--s1),var(--s2));border-radius:16px;padding:16px 18px;border:1px solid var(--brd);margin-bottom:10px;transition:background .3s,border-color .3s}
.bg{font-size:7px;padding:2px 6px;border-radius:4px;font-weight:700;display:inline-block;letter-spacing:.3px}
.pb{background:var(--brd2);border-radius:4px;height:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green2),var(--green))}
.sec{font-size:14px;font-weight:700;margin:14px 0 10px}
.tabs{display:flex;gap:4px;background:var(--chip);border-radius:10px;padding:3px;margin-bottom:14px;transition:background .3s}
.tab{flex:1;padding:8px;border-radius:8px;color:var(--txt3);font-size:11px;font-weight:600;text-align:center;cursor:pointer;transition:all .2s}
.tab.on{background:rgba(0,177,79,.15);color:var(--green)}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none}
input{color:var(--txt)}input::placeholder{color:var(--txt3)}
.post{padding:14px;background:var(--chip);border-radius:12px;border:1px solid var(--brd);margin-bottom:8px;transition:background .3s,border-color .3s}
.pa{padding:4px 10px;border-radius:6px;background:var(--chip);font-size:10px;font-weight:600;color:var(--txt3);cursor:pointer;border:none;font-family:var(--font)}
.vb{background:var(--brd2);border-radius:3px;height:4px;overflow:hidden;margin-top:6px}
.vf{height:100%;border-radius:3px;background:linear-gradient(90deg,#F59E0B,#FBBF24)}
.bk{position:fixed;top:16px;left:16px;z-index:10000;padding:8px 16px;border-radius:10px;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);border:1px solid var(--brd2);color:var(--txt2);font-size:12px;font-weight:600;text-decoration:none;font-family:var(--font);transition:.2s}
.bk:hover{color:var(--green);border-color:rgba(0,214,91,.3)}
@media(max-width:480px){.bk{top:8px;left:8px;font-size:11px;padding:6px 12px}}

/* ── Theme toggle ── */
.theme-toggle{display:flex;align-items:center;gap:5px;background:var(--chip);border:1px solid var(--brd2);border-radius:20px;padding:4px 10px;cursor:pointer;font-size:10px;font-weight:700;color:var(--txt3);font-family:var(--font);transition:all .2s}
.theme-toggle:hover{border-color:var(--green);color:var(--green)}
/* ── Map ── */
.map-wrap{position:relative;border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid var(--brd)}
.map-ring{position:absolute;top:50%;left:50%;border:2px solid rgba(0,214,91,.4);border-radius:50%;background:rgba(0,214,91,.07);pointer-events:none;transform:translate(-50%,-50%);transition:width .25s,height .25s}
.map-you{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);font-size:20px;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.map-footer{position:absolute;bottom:0;left:0;right:0;padding:6px 10px;background:linear-gradient(transparent,rgba(0,0,0,.55));display:flex;justify-content:space-between;align-items:center}
/* ── Radius slider ── */
.radius-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.radius-slider{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:4px;background:var(--brd2);outline:none}
.radius-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--green2),var(--green));cursor:pointer;border:2px solid var(--s1);box-shadow:0 0 8px rgba(0,214,91,.45)}
.lm .radius-slider{background:rgba(12,18,32,.12)}
</style>

function drawMap(radius){
  var canvas = document.getElementById('nearby-map');
  if(!canvas) return;
  var isLm = document.getElementById('phone').classList.contains('lm');
  var W = canvas.offsetWidth || 350, H = 170;
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');
  // Background
  var bg = ctx.createLinearGradient(0,0,W,H);
  if(isLm){ bg.addColorStop(0,'#C8DCAC'); bg.addColorStop(1,'#B0C890'); }
  else     { bg.addColorStop(0,'#0A160A'); bg.addColorStop(1,'#081210'); }
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  // Grid streets
  ctx.strokeStyle = isLm ? 'rgba(0,0,0,.07)' : 'rgba(255,255,255,.04)';
  ctx.lineWidth = 1;
  for(var gx=0;gx<W;gx+=30){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(var gy=0;gy<H;gy+=30){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
  // Roads
  ctx.strokeStyle = isLm ? 'rgba(255,255,255,.85)' : 'rgba(255,255,255,.13)';
  ctx.lineWidth = 5;
  var roads=[[0,H*.42,W,H*.42],[W*.5,0,W*.5,H],[W*.22,0,W*.22,H],[0,H*.72,W,H*.72],[W*.75,0,W*.75,H]];
  roads.forEach(function(r){ctx.beginPath();ctx.moveTo(r[0],r[1]);ctx.lineTo(r[2],r[3]);ctx.stroke();});
  // City blocks
  ctx.fillStyle = isLm ? 'rgba(100,140,80,.4)' : 'rgba(0,50,0,.45)';
  [[18,18,52,48],[86,16,58,38],[160,14,46,52],[220,16,64,42],[300,18,38,46],
   [18,78,38,58],[82,62,52,42],[158,74,48,48],[228,68,58,46],[295,75,40,38],
   [18,140,54,22],[90,136,42,28],[162,140,48,22],[228,138,56,22],[298,140,38,22]].forEach(function(b){
    ctx.fillRect(b[0],b[1],b[2],b[3]);
  });
  // Radius ring (draw on canvas behind pin)
  var cx=W/2, cy=H/2;
  var km2px = W / 12;
  var rPx = radius * km2px;
  ctx.beginPath(); ctx.arc(cx,cy,rPx,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,214,91,.5)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='rgba(0,214,91,.07)'; ctx.fill();
  // Circle dots
  CIRCLES_DATA.forEach(function(c){
    var dx = c.mx * W * .45;
    var dy = c.my * H * .7;
    var px = cx+dx, py = cy+dy;
    var inRange = c.dist <= radius;
    ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2);
    ctx.fillStyle = inRange ? c.bCl.replace('var(--purple)','#A855F7').replace('var(--green)','#00D65B').replace('var(--cu2)','#E89B5A') : 'rgba(255,255,255,.2)';
    ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    // Label
    ctx.fillStyle = inRange ? '#fff' : 'rgba(255,255,255,.3)';
    ctx.font = 'bold 8px Plus Jakarta Sans,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(c.name.split(' ')[0], px, py-12);
  });
  // You dot
  ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='#00D65B'; ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
}

    return;

  el.innerHTML = visible.map(function(c){

      +'<div style="font-size:11px;color:var(--txt3);margin-top:1px">'+c.type+' · '+c.slots+' · '+c.amt+'</div>'
      +'<div style="font-size:10px;color:var(--txt4);margin-top:1px">'+c.mgr+' · '+c.star+' ★ · <span style="color:var(--green)">'+c.dist+' km away</span></div></div>'
      +'<span style="font-size:7px;padding:2px 6px;border-radius:4px;font-weight:700;background:'+c.bBg+';color:'+c.bCl+'">'+c.badge+'</span>'
      +'</div>'
      +'<div style="padding:8px 10px;background:'+c.nBg+';border-radius:8px;border:1px solid '+c.nBd+';font-size:10px;color:var(--txt2);margin-bottom:10px">'+c.noteIcon+' '+c.note+'</div>'

function initNearby(){
  setTimeout(function(){
    renderNearbyCards(5);
    drawMap(5);
    var slider = document.getElementById('radius-slider');
    var label  = document.getElementById('radius-val');
    if(!slider) return;
    slider.addEventListener('input', function(){
      var v = parseFloat(this.value);
      if(label) label.textContent = v + ' km';
      renderNearbyCards(v);
      drawMap(v);
    });
    // Redraw on theme toggle
    document.getElementById('theme-btn').addEventListener('click', function(){
      setTimeout(function(){ drawMap(parseFloat(document.getElementById('radius-slider').value)); }, 50);
    });
  }, 30);
}

function showCirclesTab(tabName, clickedEl){
  var panel = document.getElementById('circles-panel');
  if(!panel) return;
  // Update tab styles
  clickedEl.parentElement.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on')});
  clickedEl.classList.add('on');
  // Swap content
  if(tabName==='my') panel.innerHTML = circlesMy;
  else if(tabName==='nearby'){panel.innerHTML = buildNearby(); initNearby();}
  else if(tabName==='vouch') panel.innerHTML = circlesVouch;
}

// Wire up circle detail tab clicks via event delegation on s-cd
document.getElementById('s-cd').addEventListener('click', function(e){
  // Tab switching
  var tab = e.target.closest('[data-cdtab]');
  if(tab){
    var name = tab.getAttribute('data-cdtab');
    var panel = document.getElementById('cd-panel');
    if(!panel) return;
    tab.parentElement.querySelectorAll('[data-cdtab]').forEach(function(t){t.classList.remove('on')});
    tab.classList.add('on');
    if(name==='overview') panel.innerHTML = buildCdOverview();
    else if(name==='members') panel.innerHTML = buildCdMembers();
    else if(name==='chat'){ panel.innerHTML = buildCdChat(); attachChatSend(); }
    return;
  }
  // Back button
  var back = e.target.closest('[data-back]');
  if(back) show(back.getAttribute('data-back'));
});

function attachChatSend(){
  var btn = document.getElementById('chat-send');
  var inp = document.getElementById('chat-inp');
  if(!btn||!inp) return;
  function doSend(){
    var txt = inp.value.trim();
    if(!txt) return;
    var msgs = document.getElementById('chat-msgs');
    if(!msgs) return;
    var d = document.createElement('div');
    d.style.cssText='display:flex;justify-content:flex-end;margin-top:8px';
    d.innerHTML='<div><div style="font-size:9px;color:var(--txt3);margin-bottom:3px;text-align:right">You · just now</div>'
      +'<div style="padding:9px 12px;background:rgba(0,177,79,.15);border-radius:14px 14px 2px 14px;max-width:220px;font-size:12px;color:var(--txt);line-height:1.5">'+txt+'</div></div>';
    msgs.appendChild(d);
    inp.value='';
    d.scrollIntoView({behavior:'smooth'});
  }
  btn.addEventListener('click', doSend);
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') doSend(); });
}
